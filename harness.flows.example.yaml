# harness.flows.example.yaml — Epic Development Workflow
#
# Copy this file to .todos/harness.flows.yaml in your project.
#
# This flow drives the full epic development lifecycle:
#   1. Epic planning: PRD + domain architecture (architect)
#   2. Architecture iteration: critic challenges, bounces until approved
#   3. Implementation plan: staged plan creation (architect)
#   4. Plan iteration: critic challenges, bounces until approved
#   5. Implementation: stage-by-stage coding (implementer) + quality challenge (reviewer)
#   6. Testing: stage-by-stage tests (tester) + quality challenge (reviewer)
#   7. Documentation: align architecture to reality, write guidelines, update repo docs (architect)
#
# Prerequisites (run once per project):
#   td role assign claude     architect
#   td role assign claude     critic
#   td role assign codex      implementer
#   td role assign claude     reviewer
#   td role assign claude     tester
#   td role define architect
#   td role define critic
#   td role define implementer
#   td role define reviewer
#   td role define tester
#   td role define orchestrator
#
# Create an epic issue and start the flow:
#   td create "Epic: <name>" --type epic --label epic --priority P1
#   td start <issue-id>
#
# Activate Sidecar Agent-Driven Mode:
#   Press H in the Sidecar harness tab, or use the command palette (? → Activate Harness)

version: 1

defaults:
  # REQUIRED — agent type that runs the Orchestrator session in Sidecar
  orchestrator_agent_type: claude
  # Role notified when iteration or bounce limits are exhausted
  escalation_role: architect
  # Total stage transitions allowed before escalation
  max_total_iterations: 60
  # Maximum times a single stage can be entered before escalation
  # Set high to allow multi-stage implementation loops (10 stages × 3 review bounces each)
  max_stage_iterations: 30
  # Maximum bounces on a single bounce edge before escalation
  max_bounces_per_edge: 5
  # How many times the same gate can fail before escalation fires
  max_gate_failures_before_escalation: 3
  # Require done/remaining/decision/uncertain in all handoffs
  require_structured_handoff: true
  # Artifact file existence is checked by file_exists gates below, not require_artifacts
  require_artifacts: false
  # Block advancement on gate failures (not just warn)
  hard_gates: true

flows:
  epic_development:
    description: "PRD + architecture → plan → staged implementation → staged tests → documentation"
    priority: 100
    orchestrator_prompt: |
      You are the Orchestrator for the epic development workflow.
      Execute exactly ONE dispatch cycle per guardian nudge, then stop.

      Per-cycle protocol:
      1. `td usage --new-session` — load your role prompt and inbox
      2. `td harness dispatchable --json` — list unowned actionable issues
      3. `td harness status --all --json` — get current_stage and current_actor_role per issue
      4. For each dispatchable issue:
         a. Required role = current_actor_role from step 3
         b. Read ~/.cache/sidecar/status/sidecar-{projectSlug}-{role}.json
         c. If status=Waiting: create handoff + nudge worker
              td handoff <id> --to-role <role> \
                --done "Dispatching to <role> for <stage>" \
                --remaining "Complete <stage> work and advance harness" \
                --decision "Role from harness current_actor_role" \
                --uncertain "Monitor for ACK within 60s"
              tmux send-keys -t sidecar-{projectSlug}-{role} "td usage --new-session" Enter
         d. If status=Thinking/Active/Starting: skip this issue this cycle
         e. If no session for role exists: td role list → spawn session → end cycle
      5. Stale handoff check: if created_at > 60s with no owner change, re-nudge same session
      6. Escalation check: if escalated=true, route to architect role
      7. Done — end cycle

      Stage sequence and responsible roles:
        epic-planning      → architect   (PRD + domain architecture)
        architecture-review → critic     (challenges architecture; bounces back if rejected)
        plan-creation      → architect   (staged implementation plan)
        plan-review        → critic      (challenges plan; bounces back if rejected)
        implementation     → implementer (stage-by-stage coding)
        impl-review        → reviewer    (challenges each stage; bounces until all stages pass)
        testing            → tester      (stage-by-stage tests)
        test-review        → reviewer    (challenges test quality; bounces until all stages pass)
        documentation      → architect   (align architecture, write guidelines, update repo docs)

    selection:
      issue_types: [epic]
      labels_any: [epic]

    stages:
      # ─── STAGE 1: Epic Planning ──────────────────────────────────────────────
      # Architect selects the epic, writes the PRD, defines domain architecture.
      # Output: prd.md, architecture.md, exec-plan (implementation stages).
      - id: epic-planning
        role: architect
        next: [architecture-review]
        checks_required:
          - "decision_log_present"
          - "exec_plan_present"
          - "file_exists:docs/epics/{issue_id}/prd.md"
          - "file_exists:docs/epics/{issue_id}/architecture.md"
        artifacts_required:
          - "docs/epics/{issue_id}/prd.md"
          - "docs/epics/{issue_id}/architecture.md"

      # ─── STAGE 2: Architecture Review ────────────────────────────────────────
      # Critic challenges the architecture. Bounces back to epic-planning if rejected.
      # Advances to plan-creation when approved.
      - id: architecture-review
        role: critic
        next: [plan-creation]
        bounce_back_to: epic-planning
        max_bounces: 5
        checks_required:
          - "review_submitted"
          - "reviewer_session_not_involved"

      # ─── STAGE 3: Implementation Plan Creation ────────────────────────────────
      # Architect writes the staged implementation plan.
      # Each stage in the plan must be self-sufficient with trackable deliverables.
      # Sets exec-plan steps for the implementation + test stages.
      # Output: implement-plan.md, updated exec-plan.
      - id: plan-creation
        role: architect
        next: [plan-review]
        checks_required:
          - "exec_plan_present"
          - "decision_log_present"
          - "file_exists:docs/epics/{issue_id}/implement-plan.md"
        artifacts_required:
          - "docs/epics/{issue_id}/implement-plan.md"

      # ─── STAGE 4: Plan Review ─────────────────────────────────────────────────
      # Critic evaluates plan completeness and stage self-sufficiency.
      # Bounces back to plan-creation if stages defer decisions without justification.
      - id: plan-review
        role: critic
        next: [implementation]
        bounce_back_to: plan-creation
        max_bounces: 5
        checks_required:
          - "review_submitted"
          - "reviewer_session_not_involved"

      # ─── STAGE 5: Implementation ──────────────────────────────────────────────
      # Implementer works through plan stages sequentially.
      # exec-plan steps track which stage is current.
      # Each bounce back from impl-review means: current stage rejected, fix it.
      # When reviewer advances (not bounces), all stages are done.
      - id: implementation
        role: implementer
        next: [impl-review]
        checks_required:
          - "code_changes_linked"
          - "exec_plan_present"
          - "build_passed"

      # ─── STAGE 6: Implementation Review ──────────────────────────────────────
      # Reviewer challenges implementation quality stage by stage.
      # Bounces back when current stage has quality issues.
      # Advances to testing only when ALL implementation stages are complete and passing.
      - id: impl-review
        role: reviewer
        next: [testing]
        bounce_back_to: implementation
        max_bounces: 15
        checks_required:
          - "review_submitted"
          - "reviewer_session_not_involved"

      # ─── STAGE 7: Testing ────────────────────────────────────────────────────
      # Tester writes tests for each implementation stage sequentially.
      # exec-plan steps track which stage's tests are current.
      - id: testing
        role: tester
        next: [test-review]
        checks_required:
          - "build_passed"
          - "tests_passed"
          - "code_changes_linked"

      # ─── STAGE 8: Test Review ─────────────────────────────────────────────────
      # Reviewer challenges test quality and coverage stage by stage.
      # Bounces back when tests for current stage are insufficient.
      # Advances to documentation when ALL stages have passing, quality tests.
      - id: test-review
        role: reviewer
        next: [documentation]
        bounce_back_to: testing
        max_bounces: 15
        checks_required:
          - "review_submitted"
          - "reviewer_session_not_involved"

      # ─── STAGE 9: Documentation (terminal) ───────────────────────────────────
      # Architect aligns architecture.md to actual implementation, writes guidelines,
      # and updates existing repo docs to reflect new changes.
      # Completion of this stage marks the epic as done in the harness.
      - id: documentation
        role: architect
        terminal: true
        checks_required:
          - "decision_log_present"
          - "file_exists:docs/epics/{issue_id}/guidelines.md"
        artifacts_required:
          - "docs/epics/{issue_id}/guidelines.md"
