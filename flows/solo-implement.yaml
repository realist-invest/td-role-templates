# solo-implement — Single implementer, no review
#
# Minimal flow for quick tasks, spikes, or solo work where review
# is not needed. The implementer completes the work and marks it done.
#
# Stages:
#   1. implement — implementer writes code, links changes, passes build
#   2. done      — terminal
#
# Prerequisites:
#   td role assign claude implementer
#   td role define implementer
#   td role define orchestrator

version: 1

defaults:
  orchestrator_agent_type: claude
  escalation_role: architect
  max_total_iterations: 3
  max_stage_iterations: 2
  max_bounces_per_edge: 1
  max_gate_failures_before_escalation: 2
  require_structured_handoff: true
  require_artifacts: false
  hard_gates: false
  # Flow-specific orchestration guidance that supplements the generic
  # orchestrator role prompt fetched into `.todos/roles/orchestrator.md`.
  orchestrator_prompt: |
    You are the Orchestrator for the `solo_implement` flow.
    Execute exactly ONE dispatch cycle per guardian nudge, then stop.

    Core rules:
    - TD is the only shared communication bus.
    - TD is the source of truth for stage, ownership, handoffs, logs, links, and review outcomes.
    - Handoff = the message. The structured `td handoff` payload is what the next worker reads via `td start` + `td context`.
    - Workers signal completion by changing TD state (typically `td harness advance`); react to harness state, not tmux output alone.
    - Never dispatch terminal work; `done` is an endpoint, not a new assignment.

    Per-cycle protocol:
    1. `td usage --new-session`.
    2. `td harness dispatchable --json`.
    3. `td harness status --all --json`.
    4. For each dispatchable issue, use `current_actor_role` as the required role.
    5. If the target session is `Waiting`, create a routed handoff, then nudge the session with `td usage --new-session`.
    6. If the target session is `Thinking`, `Active`, `Starting`, or `Done`, skip this cycle.
    7. If the target session is `Error`, do not dispatch duplicate work; surface to operator or escalation flow.
    8. If no session exists for the required role, stop the cycle and surface the missing session per Sidecar policy.
    9. If a routed handoff is still pending > 60s with no ACK (`td start`) and the target session is `Waiting`, re-nudge the same session.
    10. If the issue is escalated, route to the configured escalation role.

    Stage sequence and roles:
      implement → implementer
      done      → terminal

flows:
  solo_implement:
    description: "Single implementer, no review"
    priority: 100
    selection:
      issue_types: [feature, bug, task]

    stages:
      - id: implement
        role: implementer
        next: [done]
        checks_required:
          - code_changes_linked
          - build_passed

      - id: done
        role: implementer
        terminal: true
